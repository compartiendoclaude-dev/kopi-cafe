<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--pr:#8B4513;--ac:#DAA520;--cr:#F5E6D3;--td:#2C2C2C;--tl:#6B5B5B;--ok:#2D8659}
body{font-family:"Segoe UI",sans-serif;background:linear-gradient(135deg,#FEFEF8,#f0e8dc);min-height:100vh;color:var(--td)}
.wrap{max-width:1600px;margin:0 auto;padding:20px}
header{background:linear-gradient(135deg,var(--pr),#6B3410);padding:22px 28px;border-radius:12px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;color:white;flex-wrap:wrap;gap:12px}
.logo{font-size:36px;font-weight:900;color:var(--ac)}
.htitle{font-size:20px;font-weight:700;color:var(--cr)}
.hsub{font-size:11px;color:rgba(255,255,255,.7);margin-top:2px}
.hstat{text-align:right}.hstat-v{font-size:18px;font-weight:800}.hstat-l{font-size:10px;text-transform:uppercase;opacity:.8}
.tabs{display:flex;gap:8px;background:var(--cr);padding:8px;border-radius:12px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:9px 16px;border:none;background:transparent;color:var(--tl);cursor:pointer;font-weight:600;border-radius:8px;font-size:13px}
.tab.on{background:var(--pr);color:white;box-shadow:0 4px 12px rgba(139,69,19,.2)}
.pane{display:none}.pane.on{display:block}
.filters{background:white;padding:14px 18px;border-radius:12px;margin-bottom:14px;display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;box-shadow:0 2px 8px rgba(139,69,19,.07)}
.fg{display:flex;flex-direction:column;gap:3px}
.fl{font-size:10px;text-transform:uppercase;color:var(--tl);font-weight:600;letter-spacing:.4px}
select,input[type=text]{padding:8px 10px;border:2px solid #E8DCC8;border-radius:8px;font-size:13px;background:#FEFEF8;color:var(--td);min-width:110px}
select:focus,input:focus{outline:none;border-color:var(--pr)}
.btn{padding:8px 14px;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:12px}
.btn-a{background:var(--ac);color:var(--td)}.btn-b{background:rgba(139,69,19,.08);color:var(--pr);border:2px solid var(--pr)}
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:16px}
.kcard{background:linear-gradient(135deg,var(--cr),rgba(242,220,185,.5));padding:16px;border-radius:12px;border-left:4px solid var(--pr);box-shadow:0 2px 8px rgba(139,69,19,.07)}
.kl{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--tl);font-weight:600;margin-bottom:5px}
.kv{font-size:22px;font-weight:900;color:var(--pr)}
.tip{cursor:help;border-bottom:1px dotted var(--pr);display:inline-block;position:relative}

.cc{background:white;padding:18px;border-radius:12px;margin-bottom:14px;border-top:4px solid var(--pr);box-shadow:0 2px 8px rgba(139,69,19,.07)}
.ct{font-size:13px;font-weight:700;text-transform:uppercase;color:var(--td);margin-bottom:12px}
.ch{position:relative;height:250px}
.rs{background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(139,69,19,.07)}
.ri{padding:13px 16px;border-bottom:1px solid #E8DCC8}
.ri:last-child{border-bottom:none}.ri:hover{background:#fdf8f2}
.rh{font-weight:700;color:var(--pr);font-size:14px;margin-bottom:5px}
.rg{display:grid;grid-template-columns:repeat(auto-fit,minmax(85px,1fr));gap:8px;margin-bottom:5px}
.rl{color:var(--tl);text-transform:uppercase;font-size:10px;letter-spacing:.4px;margin-bottom:1px}
.rv{font-weight:700;color:var(--td);font-size:13px}
.badge{display:inline-block;background:var(--ac);color:var(--td);padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;margin-left:5px;vertical-align:middle}
.abt{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
.det{display:none;margin-top:10px;background:#fdf8f2;padding:10px;border-radius:8px}

.pbar{width:100%;height:8px;background:#E8DCC8;border-radius:4px;overflow:hidden;margin-top:5px}
.pbar-f{height:100%}
.nores{text-align:center;padding:40px;color:var(--tl);font-size:14px}
.aviso{background:#fff8e1;border-left:4px solid var(--ac);padding:12px 16px;border-radius:8px;font-size:13px;color:#7a6000;margin-bottom:12px}
.secret{position:fixed;bottom:20px;right:20px;width:40px;height:40px;background:rgba(218,165,32,.22);border:2px solid var(--ac);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;z-index:500}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;align-items:center;justify-content:center}
.ov.on{display:flex}
.mb{background:white;border-radius:14px;padding:28px;max-width:860px;width:92%;max-height:82vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.25)}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;border-bottom:2px solid #E8DCC8;padding-bottom:12px}
.mt{font-size:20px;font-weight:700;color:var(--pr)}
.mx{background:none;border:none;font-size:24px;cursor:pointer;color:var(--tl)}
.bg{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.bs{background:var(--cr);padding:16px;border-radius:10px;border-left:4px solid var(--pr)}

.mr:last-child{border-bottom:none}
.mok{color:var(--ok);font-weight:700}.mno{color:#bbb}
.btot{background:linear-gradient(135deg,var(--ok),#1d6f41);padding:18px;border-radius:12px;color:white;text-align:center;grid-column:1/-1}
.btot-v{font-size:32px;font-weight:900;margin-top:4px}
@media(max-width:600px){.bg{grid-template-columns:1fr}}
</style>

<script>
/* ============================================================
   SUPABASE CONFIG
   ============================================================ */
var SUPA_URL = 'https://ylsouysqlkzlfwkbvitt.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlsc291eXNxbGt6bGZ3a2J2aXR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4OTc0NDQsImV4cCI6MjA5NTQ3MzQ0NH0.zT6IpElm6KgVduSMDpsSc1Y7I0zkoqYvX9Bo4Wyrkhw';

function supaFetch(path, opts){
  return fetch(SUPA_URL+'/rest/v1/'+path, Object.assign({
    headers:{
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer '+SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    }
  }, opts));
}

/* Estado de sync */
var _syncState = 'idle'; // idle | loading | ok | error
function setSyncUI(state, msg){
  _syncState = state;
  var el = document.getElementById('syncStatus');
  if(!el) return;
  var map = {
    idle:    {txt:'⚡ Supabase', cls:'sync-idle'},
    loading: {txt:'⏳ Sincronizando…', cls:'sync-loading'},
    ok:      {txt:'✅ '+(msg||'Sincronizado'), cls:'sync-ok'},
    error:   {txt:'❌ '+(msg||'Error'), cls:'sync-error'}
  };
  var s = map[state]||map.idle;
  el.textContent = s.txt;
  el.className = 'sync-badge '+s.cls;
}

/* ── CARGAR datos desde Supabase ─────────────────────────── */
async function cargarDesdeSupabase(){
  setSyncUI('loading');
  try {
    /* Traer transacciones */
    var r = await supaFetch('kopi_transacciones?select=*&order=fecha_dt.asc&limit=5000');
    if(!r.ok) throw new Error('HTTP '+r.status);
    var txs = await r.json();

    /* Traer items */
    var r2 = await supaFetch('kopi_items?select=*&limit=20000');
    if(!r2.ok) throw new Error('HTTP '+r2.status);
    var items = await r2.json();

    /* Agrupar items por recibo */
    var itemMap = {};
    items.forEach(function(it){
      if(!itemMap[it.recibo]) itemMap[it.recibo] = [];
      itemMap[it.recibo].push({
        nombre: it.nombre, cant: it.cantidad,
        precio: parseFloat(it.precio), tipo: it.tipo
      });
    });

    /* Convertir al formato interno D[] */
    var nuevos = 0;
    var existentes = {};
    D.forEach(function(d){ existentes[d.Recibo] = true; });

    txs.forEach(function(tx){
      if(existentes[tx.recibo]) return;
      D.push({
        Fecha:       tx.fecha,
        Recibo:      tx.recibo,
        Pago:        tx.pago,
        Descripcion: tx.descripcion,
        Total:       parseFloat(tx.total)||0,
        Cliente:     tx.cliente||'',
        Cajero:      tx.cajero||'',
        TipoTx:      tx.tipo_tx,
        Items:       itemMap[tx.recibo]||[]
      });
      existentes[tx.recibo] = true;
      nuevos++;
    });

    actualizarHeader();
    setSyncUI('ok', nuevos+' nuevos de DB');
    if(nuevos > 0){
      var pane = document.querySelector('.pane.on');
      if(pane){ var id=pane.id; if(id==='res')fRes(); else if(id==='cli')fCli(); else if(id==='pro')fPro(); else if(id==='pag')fPag(); }
    }
  } catch(e){
    setSyncUI('error', e.message);
    console.error('Supabase load error', e);
  }
}

/* ── GUARDAR / UPSERT datos a Supabase ───────────────────── */
async function guardarEnSupabase(registros){
  if(!registros||!registros.length) return;
  setSyncUI('loading');
  try {
    /* Preparar transacciones */
    var txRows = registros.map(function(r){
      return {
        recibo:      r.Recibo,
        fecha:       r.Fecha,
        pago:        r.Pago,
        descripcion: r.Descripcion,
        total:       r.Total,
        cliente:     r.Cliente||null,
        cajero:      r.Cajero||null,
        tipo_tx:     r.TipoTx
      };
    });

    /* Upsert transacciones (ignora duplicados por recibo) */
    var r = await supaFetch('kopi_transacciones?on_conflict=recibo', {
      method: 'POST',
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer '+SUPA_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates,return=representation'
      },
      body: JSON.stringify(txRows)
    });
    if(!r.ok){ var err=await r.text(); throw new Error('TX: '+err); }
    var savedTxs = await r.json();

    /* Construir map recibo -> id */
    var idMap = {};
    savedTxs.forEach(function(tx){ idMap[tx.recibo] = tx.id; });

    /* Preparar items */
    var itemRows = [];
    registros.forEach(function(reg){
      var tid = idMap[reg.Recibo];
      if(!tid) return;
      (reg.Items||[]).forEach(function(it){
        itemRows.push({
          transaccion_id: tid,
          recibo:         reg.Recibo,
          nombre:         it.nombre,
          cantidad:       it.cant,
          precio:         it.precio,
          tipo:           it.tipo
        });
      });
    });

    if(itemRows.length > 0){
      /* Insertar items en lotes de 500 */
      for(var i=0; i<itemRows.length; i+=500){
        var lote = itemRows.slice(i, i+500);
        var r2 = await supaFetch('kopi_items', {
          method: 'POST',
          headers: {
            'apikey': SUPA_KEY,
            'Authorization': 'Bearer '+SUPA_KEY,
            'Content-Type': 'application/json',
            'Prefer': 'resolution=ignore-duplicates,return=minimal'
          },
          body: JSON.stringify(lote)
        });
        if(!r2.ok){ var e2=await r2.text(); console.warn('Items batch error:', e2); }
      }
    }

    setSyncUI('ok', registros.length+' guardados');
  } catch(e){
    setSyncUI('error', e.message);
    console.error('Supabase save error', e);
  }
}

/* ── SINCRONIZAR TODO D[] → Supabase ─────────────────────── */
async function sincronizarTodo(){
  if(!D.length){ alert('No hay datos para sincronizar.'); return; }
  setSyncUI('loading');
  /* Eliminar items existentes y reinsertar (evita duplicados) */
  try {
    /* Verificar cuáles recibos ya existen */
    var recibosList = D.map(function(d){ return d.Recibo; });
    var r = await supaFetch('kopi_transacciones?select=recibo&recibo=in.('+recibosList.map(function(x){ return '"'+x+'"'; }).join(',')+')', {
      headers:{ 'apikey':SUPA_KEY, 'Authorization':'Bearer '+SUPA_KEY }
    });
    var existentes = {};
    if(r.ok){
      var existing = await r.json();
      existing.forEach(function(tx){ existentes[tx.recibo]=true; });
    }
    var nuevos = D.filter(function(d){ return !existentes[d.Recibo]; });
    if(nuevos.length === 0){
      setSyncUI('ok', 'Todo ya sincronizado');
      return;
    }
    await guardarEnSupabase(nuevos);

/* ── Helper: actualizar header stats ─────────────────────── */
function actualizarHeader(){
  var tot = D.reduce(function(s,d){ return s+(d.Total||0); }, 0);
  var hR = document.getElementById('hReg');
  var hT = document.getElementById('hTot');
  if(hR) hR.textContent = D.length.toLocaleString();
  if(hT) hT.textContent = '$'+tot.toFixed(2);
  /* Actualizar subtítulo con rango de fechas */
  var fechas = D.map(function(d){ return pF(d.Fecha); }).filter(Boolean);
  if(fechas.length){
    var minF=new Date(Math.min.apply(null,fechas)), maxF=new Date(Math.max.apply(null,fechas));
    var meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    var sub=minF.getDate()+' '+meses[minF.getMonth()]+' &ndash; '+maxF.getDate()+' '+meses[maxF.getMonth()]+' '+maxF.getFullYear();
    var hS=document.getElementById('hSubtitle'); if(hS) hS.innerHTML=sub;
  }
}

function $i(id){return document.getElementById(id);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function pF(s){var p=s.split(' ')[0].split('/');return new Date(2000+parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));}
function gP(s){var m=s.match(/Kopi\s+([^$]+)/);return m?m[1].trim():s;}

function enPer(f,p){
  if(!p)return true;
  var d=f.getDate(),m=f.getMonth()+1;
  /* Periodos de corte */
  if(p==='A'){return m===5&&d>=10&&d<=24;}
  if(p==='B'){if(m===5)return d>=25;if(m===6)return d<=9;return false;}
  /* Periodos Junio extra */
  if(p==='E'){return m===6&&d>=10&&d<=24;}
  if(p==='F'){if(m===6)return d>=25;if(m===7)return d<=9;return false;}
  return true;
}
function lPer(p){
  if(p==='A')return '10-24May';
  if(p==='B')return '25May-9Jun';
  return 'Todo';
}
function enQ(f,q){
  if(q==='all')return true;
  if(q==='A'){var d=f.getDate(),m=f.getMonth()+1;return m===5&&d>=10&&d<=24;}
  if(q==='B'){var d2=f.getDate(),m2=f.getMonth()+1;if(m2===5)return d2>=25;if(m2===6)return d2<=9;return false;}
  if(q==='j1'){return f.getMonth()===5&&f.getDate()<=15;}
  return true;
}

function fCli(){
  var bus=$i('cBus').value.toLowerCase().trim();
  var per=$i('cPer').value,pago=$i('cPago').value,tipo=$i('cTipo').value;
  var badge=lPer(per);

  var datos=D.filter(function(d){
    var f=pF(d.Fecha);
    var okP=enPer(f,per);
    var okPg=!pago||d.Pago===pago;
    var okT=!tipo||d.TipoTx===tipo||d.TipoTx==='mixto';
    if(!okP||!okPg||!okT)return false;
    if(!bus)return true;
    var ra=(d.Recibo||'').toLowerCase();
    if(ra.indexOf(bus)!==-1)return true;
    if(!d.Cliente||!d.Cliente.trim())return false;
    var pal=d.Cliente.toLowerCase().split(' ');
    return bus.split(' ').every(function(t){return pal.some(function(p){return p.indexOf(t)!==-1;});});
  });

  var conCliente=datos.filter(function(d){return d.Cliente&&d.Cliente.trim();});
  var sinCliente=datos.length-conCliente.length;
  var avisoHTML='';
  if(datos.length>0&&conCliente.length===0){
    $i('cliC').innerHTML='<div class="aviso">&#9888; El periodo <strong>'+badge+'</strong> no tiene datos de cliente registrados.</div>';
    return;
  }
  if(sinCliente>0){
    avisoHTML='<div class="aviso">&#9432; '+sinCliente+' transacciones sin cliente registrado no se muestran.</div>';
  }

  CMAP={};
  var map={};
  conCliente.forEach(function(d){if(!map[d.Cliente])map[d.Cliente]=[];map[d.Cliente].push(d);});

  var h=avisoHTML;
  Object.entries(map).sort(function(a,b){return b[1].length-a[1].length;}).forEach(function(e){
    var nom=e[0],cx=e[1];
    var tot=cx.reduce(function(s,c){return s+(c.Total||0);},0);
    var uid='u'+(++_uid);
    CMAP[uid]={nom:nom,per:badge,tot:tot,cx:cx};
    var pagos=[];cx.forEach(function(c){if(pagos.indexOf(c.Pago)===-1)pagos.push(c.Pago);});

      +'<div style="font-size:11px;color:var(--tl);margin-bottom:7px">RA: '+esc(cx[0].Recibo)+' | '+esc(pagos.join(', '))+'</div>'
      +'<div class="rg">'
      +'<div><div class="rl">Total gastado</div><div class="rv">$'+tot.toFixed(2)+'</div></div>'
      +'<div><div class="rl">Transacciones</div><div class="rv">'+cx.length+'</div></div>'
      +'<div><div class="rl">Promedio</div><div class="rv">$'+(tot/cx.length).toFixed(2)+'</div></div>'
      +'</div>'
      +'<div class="abt">'
      +'<button class="btn btn-a" onclick="expPDF(\''+uid+'\')">&#x1F4C4; PDF</button>'
      +'<button class="btn btn-a" onclick="expPDFyWA(\''+uid+'\')">&#x1F4C4;&#x1F4AC; PDF+WA</button>'
      +'<button class="btn btn-a" onclick="expWA(\''+uid+'\')">&#x1F4AC; WhatsApp</button>'
      +'<button class="btn btn-b" onclick="togDet(\''+uid+'\',this)">Ver detalle</button>'
      +'</div>'
      +'<div id="'+uid+'" class="det">';
    cx.sort(function(a,b){return pF(b.Fecha)-pF(a.Fecha);}).forEach(function(c){
      h+='<div class="det-i"><strong>'+esc(c.Fecha)+'</strong> &ndash; '+esc(gP(c.Descripcion))+' &ndash; $'+c.Total.toFixed(2)+' ('+esc(c.Pago)+')</div>';
    });
    h+='</div></div>';
  });
  if(conCliente.length===0){h+=('<div class="nores">Sin resultados</div>');}
  $i('cliC').innerHTML=h;

function calcBQ(datos){
  var v=datos.reduce(function(s,d){return s+(d.Total||0);},0);
  var b=0;
  datos.forEach(function(d){(d.Items||[]).forEach(function(it){if(it.tipo==='bebida')b+=it.cant;});});
  var bv=0,bb=0;
  METAS.forEach(function(m){
    if(m.t==='v'&&v>=m.val)bv+=m.b;
    if(m.t==='b'&&b>=m.val)bb+=m.b;
  });
  return{v:v,b:b,bv:bv,bb:bb,tot:bv+bb};
}
function secBonos(label,datos){

  }).join('');
  return '<div class="bs"><div class="bst">'+label+'</div>'
    +'<div class="bi"><div><div class="bil">Venta total</div><div style="font-weight:700">$'+r.v.toFixed(2)+'</div></div><div style="font-weight:700;color:var(--ok)">+$'+r.bv+'</div></div>'

  var html = '<div style="font-family:Arial,sans-serif;padding:32px;max-width:700px">'
    +'<div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;border-bottom:3px solid #8B4513;padding-bottom:16px">'

    +(function(){

      return '<div style="display:grid;grid-template-columns:'+cols+';gap:16px;margin-bottom:20px">'

            +'</div>';
        }).join('')
        +'</div>';
    }())

    +secciones.map(function(sec){return seccion(sec.label,calcBQ(sec.datos));}).join('')

    +'<div style="border-top:2px solid #F5E6D3;padding-top:16px;margin-top:8px">'

    +'</tr>'
    +secciones.map(function(sec){
      var r=calcBQ(sec.datos);
      return '<tr style="background:#edf7f1">'
        +'<td style="padding:8px 10px;font-size:13px;color:#6B5B5B">'+sec.label+' (ventas: $'+r.v.toFixed(2)+' | bebidas: '+r.b+')</td>'
        +'<td style="padding:8px 10px;text-align:right;font-weight:600">$'+r.tot+'</td>'
        +'</tr>';
    }).join('')
    +'</table></div>'
    +'</div>';

  var el=document.createElement('div');
  el.innerHTML=html;
  html2pdf().set({
    margin:10,
    filename:'kopi_bonos_'+per+'.pdf',
    html2canvas:{scale:2},
    jsPDF:{format:'a4',orientation:'portrait'}
  }).from(el).save();
}

function cargarCSV(input){
  var file=input.files[0];
  if(!file)return;
  var status=$i('csvStatus');
  status.textContent='Cargando...';
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var lines=e.target.result.split(/\r?\n/).filter(function(l){return l.trim();});
      if(lines.length<2){status.textContent='CSV vacío';return;}

      /* Detectar separador */
      var sep=lines[0].indexOf(';')!==-1?';':',';
      var headers=lines[0].split(sep).map(function(h){return h.trim().replace(/^"|"$/g,'');});

      /* Mapear columnas */
      function col(h,alts){
        var idx=headers.findIndex(function(x){
          return x===h||alts.some(function(a){return x.toLowerCase().indexOf(a.toLowerCase())!==-1;});
        });
        return idx;
      }
      var iF  =col('Fecha',['fecha']);
      var iR  =col('Número de recibo',['recibo','receipt']);
      var iP  =col('Tipo de pago',['pago','payment']);
      var iD  =col('Descripción',['descripci','description']);
      var iT  =col('Total recaudado',['total','amount','recaudado']);
      var iCl =col('Nombre del cliente',['cliente','customer','client']);
      var iCa =col('Nombre del cajero',['cajero','cashier']);

      var BPROD=['Chocolate extra','Kopi Americano G.','Kopi Capuccino','Kopi Espresso',
                 'Kopi Frappe','Kopi Latte ice','Kopi Soda italiana sencilla',
                 'Kopi chocolatte','Kopi latte','Kopi mocachino',
                 'Kopi soda italiana con topping','Kopi t\u00e8','Salutaris/Coca cola'];
      var CPROD=['Bagel con pollo','Bagel jamon','Galleta','Kopi Dona','Kopi Magdalena',
                 'Kopi Palomitas de maiz','Kopi Pizza','Kopi Sandwich de pollo',
                 'Kopi Strudel','Kopi Tres leches','Kopi Yogurt','Kopi avena',
                 'Kopi cheesecake','Kopi cupcake','Kopi gelatina','Kopi kekitos 3x',
                 'Kopi pastel','Kopi rollos de canela','Kopi sandwhis'];

      function clasif(n){
        if(BPROD.indexOf(n)!==-1)return 'bebida';
        if(CPROD.indexOf(n)!==-1)return 'comida';
        return 'otro';
      }
      function parsItems(desc){
        var re=/(\d+)\s*x\s*([^$,]+?)\s*\$([\d.]+)/g,m,out=[];
        while((m=re.exec(desc))!==null){
          var nom=m[2].trim();
          out.push({nombre:nom,cant:parseInt(m[1]),precio:parseFloat(m[3]),tipo:clasif(nom)});
        }
        return out;
      }
      function normFecha(s){
        s=s.trim().replace(/^"|"$/g,'');
        var p=s.split(' '),fd=p[0],hr=p[1]||'00:00';
        var parts=fd.split('/');
        if(parts.length===3){
          var dd=parseInt(parts[0]),mm=parseInt(parts[1]),yy=parts[2];
          if(yy.length===4)yy=yy.slice(2);
          return dd+'/'+mm+'/'+yy+' '+hr;
        }
        return s;
      }

      /* Recibos existentes */
      var existentes={};
      D.forEach(function(r){existentes[r.Recibo]=true;});

      var nuevos=0,act=0;
      for(var i=1;i<lines.length;i++){
        var vals=lines[i].split(sep).map(function(v){return v.trim().replace(/^"|"$/g,'');});
        if(vals.length<4)continue;
        var recibo=iR!==-1?vals[iR]:'';
        var desc  =iD!==-1?vals[iD]:'';
        var total =iT!==-1?parseFloat(vals[iT])||0:0;
        var fecha =iF!==-1?normFecha(vals[iF]):'';
        var pago  =iP!==-1?vals[iP]:'';
        var cli   =iCl!==-1?vals[iCl]:'';
        var cajero=iCa!==-1?vals[iCa]:'';

        var items =parsItems(desc);
        var tipos =items.map(function(it){return it.tipo;});
        var tx    =tipos.indexOf('bebida')!==-1&&tipos.indexOf('comida')!==-1?'mixto':
                   tipos.indexOf('bebida')!==-1?'bebida':
                   tipos.indexOf('comida')!==-1?'comida':'otro';

        var reg={Fecha:fecha,Recibo:recibo,Pago:pago,Descripcion:desc,
                 Total:total,Cliente:cli,Cajero:cajero,TipoTx:tx,Items:items};

        if(existentes[recibo]){
          /* Si ya existe pero ahora tiene cliente, actualizar */
          for(var k=0;k<D.length;k++){
            if(D[k].Recibo===recibo){
              if(!D[k].Cliente&&cli){D[k].Cliente=cli;act++;}
              break;
            }
          }
        } else {
          D.push(reg);
          existentes[recibo]=true;
          nuevos++;
        }
      }

      /* Actualizar header */
      var tot=D.reduce(function(s,d){return s+(d.Total||0);},0);
      $i('hReg').textContent=D.length.toLocaleString();
      $i('hTot').textContent='$'+tot.toFixed(2);

      /* Inferir rango de fechas para el subtítulo */
      var fechas=D.map(function(d){return pF(d.Fecha);}).filter(Boolean);
      if(fechas.length){
        var minF=new Date(Math.min.apply(null,fechas));
        var maxF=new Date(Math.max.apply(null,fechas));
        var meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
        var sub=minF.getDate()+' '+meses[minF.getMonth()]+' &ndash; '
          +maxF.getDate()+' '+meses[maxF.getMonth()]+' '+maxF.getFullYear();
        if($i('hSubtitle'))$i('hSubtitle').innerHTML=sub;
      }

      status.textContent=nuevos+' nuevos, '+act+' actualizados';
      status.style.color='#90EE90';
      setTimeout(function(){status.textContent='';status.style.color='';},4000);

      /* Guardar nuevos en Supabase automáticamente */
      if(nuevos > 0){
        var nuevosRegs = D.slice(D.length - nuevos);
        guardarEnSupabase(nuevosRegs);
      }

      /* Refrescar la pestaña activa */
      var paneActivo=document.querySelector('.pane.on');
      if(paneActivo){
        var id=paneActivo.id;
        if(id==='res')fRes();
        else if(id==='cli')fCli();
        else if(id==='pro')fPro();
        else if(id==='pag')fPag();
      }
      input.value='';
    } catch(err){
      status.textContent='Error: '+err.message;
      status.style.color='#FF6B6B';
    }
  };
  reader.readAsText(file,'UTF-8');
}
